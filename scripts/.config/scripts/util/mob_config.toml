# Mob/demob cost estimates — all values in SGD.
# Airfare is a round-trip flexible-return ticket estimate.
# It is buffered by airfare_buffer_pct to account for price volatility.
# To add a new country: copy any [countries.XX] block and update the values.

[defaults]
mob_days                = 10   # standard working-day mob/demob period
airfare_buffer_pct      = 20   # % buffer applied to airfare for price volatility
airfare_change_fee      = 250  # return date change fee (SGD); always assumed to occur
allowance_per_day       = 100  # daily engineer abroad allowance
engineer_travel_day_rate = 500 # engineer cost per calendar travel day (capped at 8 hrs)
sg_transport_one_way    = 50  # taxi to/from Changi Airport (SGD), same for all destinations
lumpsum_round           = 500  # round final lumpsum to nearest N
routing_extra_days      = 2    # extra days added for routing-heavy destinations
buc_gm_pct             = 5    # % GM applied to lumpsum to get Base Unit Cost
selling_gm_pct         = 30   # % GM applied to BUC to get selling price
usd_exchange_rate      = 1.35  # SGD per 1 USD
usd_round              = 100  # USD rounding granularity (finer than SGD to stay near exchange rate)

[batam]
name                 = "Batam, Indonesia"
ferry_one_way        = 35
visa                 = 0
transport_one_way    = 20
hotel_per_night      = 120
travel_days_one_way  = 0      # 45-min ferry, not a full travel day

